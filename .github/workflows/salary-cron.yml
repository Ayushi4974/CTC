name: Salary & Bonus Cron (Direct)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-salary-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run salary cron directly
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: production
        run: |
          cd server
          node -e "
          (async () => {
            console.log('============================================');
            console.log('[CRON] Starting Salary Cron at:', new Date().toISOString());
            console.log('============================================');
            
            const { runSalaryCron, check7thSalaryQualification, pay7thSalary } = require('./cron/salaryCron');
            require('dotenv').config();
            
            console.log('[1/4] Loading mongoose...');
            const mongoose = require('mongoose');
            
            console.log('[2/4] Connecting to MongoDB...');
            await mongoose.connect(process.env.MONGODB_URL);
            console.log('[2/4] MongoDB connected');
            
            const dayOfMonth = new Date().getUTCDate();
            console.log('[3/4] Current Day of Month:', dayOfMonth);
            
            let result = { success: true };
            
            if (dayOfMonth === 6) {
              console.log('Running 6th of month qualification check...');
              await check7thSalaryQualification();
              console.log('[CRON] ✅ 6th of month check complete');
            } else if (dayOfMonth === 7) {
              console.log('Running 7th of month payout...');
              await pay7thSalary();
              console.log('[CRON] ✅ 7th of month payout complete');
            } else {
              console.log('Running daily rank evaluation...');
              result = await runSalaryCron();
              console.log('[CRON] ✅ Daily rank evaluation complete');
            }
            
            console.log('[4/4] Result:', JSON.stringify(result, null, 2));
            process.exit(0);
          })().catch(err => {
            console.error('[CRON] ❌ Fatal error:', err.message);
            console.error(err.stack);
            process.exit(1);
          });
          "
