name: Mining Cron (Direct - Testing)

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  run-mining-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Changed from 18 to 20 (fixes warnings)
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run mining cron directly
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: production
        run: |
          node -e "
          (async () => {
            console.log('============================================');
            console.log('[TEST] Starting at:', new Date().toISOString());
            console.log('============================================');
            
            const { runMiningCronCycle } = require('./server/cron/miningCron');
            require('dotenv').config();
            
            console.log('[1/4] Loading mongoose...');
            const mongoose = require('mongoose');
            
            console.log('[2/4] Connecting to MongoDB...');
            await mongoose.connect(process.env.MONGODB_URL);
            console.log('[2/4] MongoDB connected');
            
            console.log('[3/4] Running mining cron (force=true for testing)...');
            const result = await runMiningCronCycle(true);
            
            console.log('[4/4] Result:', JSON.stringify(result, null, 2));
            
            if (result.success) {
              console.log('[TEST] ✅ Cron completed successfully');
              process.exit(0);
            } else {
              console.log('[TEST] ⚠️ Result:', result.reason);
              process.exit(0);
            }
          })().catch(err => {
            console.error('[TEST] ❌ Fatal error:', err.message);
            console.error(err.stack);
            process.exit(1);
          });
          "
